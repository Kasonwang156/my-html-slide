<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>账号密码管家</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"PingFang SC","Microsoft YaHei",sans-serif;
  background:#f4f6fb;
  color:#222;
}
.app{display:none;height:100vh}
.layout{display:flex;height:100vh;overflow:hidden}

.sidebar{
  width:240px;
  background:#fff;
  border-right:1px solid #e5e7eb;
  padding:20px 15px;
  overflow:auto;
  transition:.3s;
}
.sidebar.hide{
  transform:translateX(-100%);
  position:absolute;
  z-index:99;
  height:100%;
}

.logo{
  font-size:24px;
  font-weight:700;
  margin-bottom:25px;
}

.section-title{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
  font-size:16px;
  font-weight:700;
}

.add-btn{
  border:none;
  background:#2563eb;
  color:#fff;
  border-radius:10px;
  cursor:pointer;
}

.platform-list{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.platform-item{
  padding:10px 14px;
  background:#f3f4f6;
  border-radius:12px;
  cursor:pointer;
  font-size:14px;
}

.platform-item.active{
  background:#2563eb;
  color:#fff;
}

.main{
  flex:1;
  padding:18px;
  overflow:auto;
}

.mobile-top{
  display:none;
  position:sticky;
  top:0;
  z-index:50;
  background:#f4f6fb;
  padding-bottom:12px;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}

.menu-btn{
  border:none;
  border-radius:12px;
  background:#2563eb;
  color:#fff;
  padding:0 16px;
  height:42px;
  font-size:14px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  gap:12px;
  margin-bottom:20px;
}

.search{
  flex:1;
  height:45px;
  border-radius:14px;
  border:1px solid #d1d5db;
  padding:0 15px;
  outline:none;
}

.add-account{
  height:45px;
  padding:0 18px;
}

.card-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:15px;
}

.card{
  min-height:230px;
  background:#fff;
  border-radius:20px;
  padding:18px;
  box-shadow:0 5px 20px rgba(0,0,0,.05);
}

.card-top{
  display:flex;
  align-items:center;
  gap:15px;
}

.card-top img{
  width:68px;
  height:68px;
  border-radius:16px;
  object-fit:cover;
  border:1px solid #eee;
}

.platform-name{
  font-size:20px;
  font-weight:700;
}

.info{
  margin-top:14px;
  line-height:2;
  font-size:15px;
  word-break:break-all;
}

.actions{
  flex-wrap:wrap;
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:16px;
  gap:10px;
  flex-wrap:wrap;
}

.link{
  color:#2563eb;
  text-decoration:none;
  font-size:14px;
}

.btns{
  display:flex;
  gap:10px;
}

.small-btn{
  border:none;
  background:#f3f4f6;
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
}

.pagination{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:25px;
  flex-wrap:wrap;
}

.page-btn{
  width:40px;
  height:40px;
  border:none;
  border-radius:10px;
  background:#fff;
  cursor:pointer;
}

.page-btn.active{
  background:#2563eb;
  color:#fff;
}

.login{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.login-box{
  background:#fff;
  width:92%;
  max-width:360px;
  border-radius:22px;
  padding:30px;
}

.login-box h2{margin-bottom:20px}

.login-box input{
  width:100%;
  height:45px;
  border-radius:12px;
  border:1px solid #ddd;
  padding:0 15px;
  margin-bottom:15px;
}

.login-box button{
  width:100%;
  height:45px;
  border:none;
  border-radius:12px;
  background:#2563eb;
  color:#fff;
}

@media(max-width:768px){
  .card-grid{
    display:flex;
    flex-direction:column;
  }

  .sidebar{
    transform:translateX(-110%);
  }

  .sidebar.show{
    transform:translateX(0);
  }
  .mobile-top{display:flex}

  .sidebar{
    position:fixed;
    left:0;
    top:0;
    z-index:999;
    height:100%;
    box-shadow:0 0 20px rgba(0,0,0,.15);
  }

  .sidebar.hide{
    transform:translateX(-110%);
  }

  .topbar{
    flex-direction:column;
  }

  .add-account{
    width:100%;
  }

  .card{
    padding:16px;
  }

  .platform-name{
    font-size:18px;
  }

  .card-top img{
    width:58px;
    height:58px;
  }
}
</style>
</head>
<body>

<div class="login" id="loginPage">
  <div class="login-box">
    <h2>请输入访问密码</h2>
    <input type="password" id="password" placeholder="请输入密码">
    <button onclick="checkPassword()">进入页面</button>
  </div>
</div>

<div class="app" id="app">
  <div class="layout">

    <div class="sidebar" id="sidebar">
      <div class="logo">账号密码管家</div>

      <div class="section-title">
        <span>平台分类</span>
        <button class="add-btn" onclick="addPlatform()">+</button>
      </div>

      <div class="platform-list" id="platformList"></div>
    </div>

    <div class="main">

      <div class="mobile-top">
        <div style="font-size:20px;font-weight:700">账号密码管家</div>
        <button class="menu-btn" onclick="toggleSidebar()">平台分类</button>
      </div>
      </div>
      <div class="topbar">
        <input class="search" id="searchInput" placeholder="搜索账号或平台...">
        <button class="add-btn" style="width:auto;padding:0 18px;height:42px" onclick="addAccount()">添加账号</button>
      </div>

      <div class="card-grid" id="cardGrid"></div>

      <div class="pagination" id="pagination"></div>
    </div>

  </div>
</div>

<script>
const PASSWORD = 'wangkai10..';
const PAGE_SIZE = 6;
let currentPage = 1;
let currentPlatform = '全部';

window.addEventListener('storage',()=>{
  renderPlatforms();
  renderAccounts();
});

if(!localStorage.getItem('platforms')){
  localStorage.setItem('platforms', JSON.stringify([
    '全部','QQ','微信','抖音','淘宝'
  ]));
}

if(!localStorage.getItem('accounts')){
  localStorage.setItem('accounts', JSON.stringify([
    {
      id:Date.now(),
      platform:'QQ',
      account:'123456789',
      password:'123456',
      contact:'123456@qq.com',
      website:'https://im.qq.com/',
      logo:'https://q1.qlogo.cn/g?b=qq&nk=10000&s=640'
    },
    {
      id:Date.now()+1,
      platform:'微信',
      account:'wx888888',
      password:'888888',
      contact:'138****8888',
      website:'https://weixin.qq.com/',
      logo:'https://res.wx.qq.com/a/wx_fed/assets/res/NTI4MWU5.ico'
    }
  ]));
}

function getPlatforms(){
  return JSON.parse(localStorage.getItem('platforms'));
}

function getAccounts(){
  return JSON.parse(localStorage.getItem('accounts'));
}

function saveAccounts(data){
  localStorage.setItem('accounts',JSON.stringify(data));
}

function savePlatforms(data){
  localStorage.setItem('platforms',JSON.stringify(data));
}

function toggleSidebar(){
  const sidebar=document.getElementById('sidebar');
  if(window.innerWidth<=768){
    sidebar.classList.toggle('show');
  }else{
    sidebar.classList.toggle('hide');
  }
}

document.addEventListener('click',function(e){
  const sidebar=document.getElementById('sidebar');
  const menuBtn=document.querySelector('.menu-btn');

  if(window.innerWidth<=768){
    const clickInside=sidebar.contains(e.target)||menuBtn.contains(e.target);

    if(!clickInside && sidebar.classList.contains('show')){
      sidebar.classList.remove('show');
    }
  }
});

function checkPassword(){
  const value=document.getElementById('password').value;

  if(value===PASSWORD){
    document.getElementById('loginPage').style.display='none';
    document.getElementById('app').style.display='block';
    renderPlatforms();
    renderAccounts();
  }else{
    alert('密码错误');
    window.close();
    location.href='about:blank';
  }
}

function renderPlatforms(){
  const list=document.getElementById('platformList');

  list.innerHTML='';

  getPlatforms().forEach(platform=>{
    const div=document.createElement('div');
    div.className='platform-item'+(platform===currentPlatform?' active':'');
    div.innerHTML=`
      ${platform}
    `;

    div.onclick=()=>{
      currentPlatform=platform;
      currentPage=1;
      renderPlatforms();
      renderAccounts();
    };

    div.oncontextmenu=(e)=>{
      e.preventDefault();

      if(platform==='全部') return;

      if(confirm('删除平台？')){
        let arr=getPlatforms().filter(p=>p!==platform);
        savePlatforms(arr);
        currentPlatform='全部';
        renderPlatforms();
        renderAccounts();
      }
    }

    list.appendChild(div);
  });
}

function renderAccounts(){
  const keyword=document.getElementById('searchInput').value.toLowerCase();

  let accounts=getAccounts().filter(item=>{
    const matchPlatform=currentPlatform==='全部'||item.platform===currentPlatform;

    const matchSearch=
      item.platform.toLowerCase().includes(keyword)||
      item.account.toLowerCase().includes(keyword);

    return matchPlatform&&matchSearch;
  });

  const totalPages=Math.ceil(accounts.length/PAGE_SIZE)||1;

  if(currentPage>totalPages) currentPage=1;

  const start=(currentPage-1)*PAGE_SIZE;
  const pageData=accounts.slice(start,start+PAGE_SIZE);

  const grid=document.getElementById('cardGrid');

  grid.innerHTML='';

  pageData.forEach(item=>{
    const card=document.createElement('div');
    card.className='card';

    card.innerHTML=`
      <div class="card-top">
        <a href="${item.website}" target="_blank">
          <img src="${item.logo}">
        </a>

        <div>
          <div class="platform-name">${item.platform}</div>
        </div>
      </div>

      <div class="info">
        <div><b>账号：</b>${item.account}</div>
        <div><b>密码：</b>${item.password}</div>
        <div><b>备注：</b>${item.contact || '无备注'}</div>
      </div>

      <div class="actions">
        <a class="link" href="${item.website}" target="_blank">访问网站</a>

        <div class="btns">
          <button class="small-btn" onclick="editAccount(${item.id})">编辑</button>
          <button class="small-btn" onclick="deleteAccount(${item.id})">删除</button>
        </div>
      </div>
    `;

    grid.appendChild(card);
  });

  renderPagination(totalPages);
}

function renderPagination(total){
  const pagination=document.getElementById('pagination');

  pagination.innerHTML='';

  for(let i=1;i<=total;i++){
    const btn=document.createElement('button');

    btn.className='page-btn'+(i===currentPage?' active':'');

    btn.innerText=i;

    btn.onclick=()=>{
      currentPage=i;
      renderAccounts();
    };

    pagination.appendChild(btn);
  }
}

function addPlatform(){
  const name=prompt('请输入平台名称');

  if(!name) return;

  const arr=getPlatforms();

  if(arr.includes(name)){
    alert('平台已存在');
    return;
  }

  arr.push(name);

  savePlatforms(arr);

  renderPlatforms();
}

function addAccount(){
  const platform=prompt('平台名称');
  if(!platform) return;

  const account=prompt('账号');
  if(!account) return;

  const password=prompt('密码');
  if(!password) return;

  const contact=prompt('备注（可留空）') || '';
  const website=prompt('网址（https://）');
  const logo=prompt('LOGO图片地址');

  const data=getAccounts();

  data.unshift({
    id:Date.now(),
    platform,
    account,
    password,
    contact,
    website,
    logo
  });

  saveAccounts(data);

  if(!getPlatforms().includes(platform)){
    const arr=getPlatforms();
    arr.push(platform);
    savePlatforms(arr);
    renderPlatforms();
  }

  renderAccounts();
}

function editAccount(id){
  const data=getAccounts();

  const item=data.find(i=>i.id===id);

  if(!item) return;

  item.platform=prompt('平台名称',item.platform)||item.platform;
  item.account=prompt('账号',item.account)||item.account;
  item.password=prompt('密码',item.password)||item.password;
  item.contact=prompt('备注（可留空）',item.contact) ?? item.contact;
  item.website=prompt('网址',item.website)||item.website;
  item.logo=prompt('LOGO图片地址',item.logo)||item.logo;

  saveAccounts(data);

  renderPlatforms();
  renderAccounts();
}

function deleteAccount(id){
  if(!confirm('确认删除？')) return;

  let data=getAccounts().filter(i=>i.id!==id);

  saveAccounts(data);

  renderAccounts();
}

document.getElementById('searchInput').addEventListener('input',()=>{
  currentPage=1;
  renderAccounts();
});
</script>

</body>
</html>
